# git-cliff configuration for LWPT's CHANGELOG.md.
#
# Run on every tag push by .github/workflows/release.yml's `changelog`
# job; the result lands on `main` via an auto-PR titled "Update
# CHANGELOG.md for <version>". Locally, you can preview with:
#
#   git-cliff --latest --strip header        # just the latest tag's entries
#   git-cliff -o CHANGELOG.md                # regenerate the whole file
#
# The commit parsers are permissive (no Conventional Commits required) —
# they bin messages by leading verb. The same categorisation is mirrored
# in .github/release.yml (used by softprops/action-gh-release@v2) so the
# CHANGELOG and the GitHub Release notes show the same shape.

[changelog]
header = """
# Changelog

All notable changes to LWPT are documented in this file. The format follows [Keep a Changelog](https://keepachangelog.com/en/1.1.0/), with categories matched to the GitHub Release notes generated by `.github/release.yml`.
"""
body = """
{%- macro remote_url() -%}https://github.com/frostney/lwpt{%- endmacro -%}

{% if version -%}
  ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
  ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}
{% for commit in commits %}
  - {{ commit.message | split(pat="\n") | first | trim }}
{%- endfor %}
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = false
filter_unconventional = false
split_commits = false
protect_breaking_commits = false
tag_pattern = "^v?[0-9]+\\.[0-9]+\\.[0-9]+(-.*)?$"
sort_commits = "newest"

commit_parsers = [
  # Skip noise.
  { message = "^Merge branch",        skip = true },
  { message = "^Merge pull request",  skip = true },
  { message = "^Update CHANGELOG",    skip = true },

  # Categories match the .github/release.yml category labels.
  { message = "^Add ",        group = "New Features" },
  { message = "^Implement ",  group = "New Features" },
  { message = "^Support ",    group = "New Features" },
  { message = "^Allow ",      group = "New Features" },
  { message = "^Introduce ",  group = "New Features" },
  { message = "^Enable ",     group = "New Features" },

  { message = "^Fix ",        group = "Bug Fixes" },
  { message = "^Repair ",     group = "Bug Fixes" },
  { message = "^Resolve ",    group = "Bug Fixes" },
  { message = "^Correct ",    group = "Bug Fixes" },

  { message = "^Optimi[sz]e", group = "Performance" },
  { message = "^Speed up",    group = "Performance" },

  { message = "^Document ",   group = "Documentation" },
  { message = "^Docs:? ",     group = "Documentation" },
  { message = "^Clarify ",    group = "Documentation" },

  { message = "^Refactor ",   group = "Internal" },
  { message = "^Clean ",      group = "Internal" },
  { message = "^Rename ",     group = "Internal" },
  { message = "^Move ",       group = "Internal" },
  { message = "^Drop ",       group = "Internal" },
  { message = "^Remove ",     group = "Internal" },
  { message = "^Sweep ",      group = "Internal" },
  { message = "^Update ",     group = "Internal" },
  { message = "^Bump ",       group = "Internal" },

  # Fallback for anything else.
  { message = ".*",           group = "Other Changes" },
]
