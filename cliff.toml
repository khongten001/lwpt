# git-cliff configuration for LWPT's CHANGELOG.md.
#
# Run while preparing a release PR, before the release tag exists, so the
# tag points at a commit that already contains its own changelog. Locally,
# you can preview with:
#
#   git-cliff --latest --strip header        # just the latest tag's entries
#   git-cliff -o CHANGELOG.md                # regenerate the whole file
#
# The commit parsers are permissive (no Conventional Commits required) —
# they bin messages by leading verb. release.yml publishes the matching
# section from CHANGELOG.md as the GitHub Release notes.

[changelog]
header = """
# Changelog

All notable changes to LWPT are documented in this file. The format follows [Keep a Changelog](https://keepachangelog.com/en/1.1.0/), and the GitHub Release notes are published from the matching section below.
"""
body = """
{%- macro remote_url() -%}https://github.com/frostney/lwpt{%- endmacro -%}

{% if version -%}
  ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
  ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}
{% for commit in commits %}
  - {{ commit.message | split(pat="\n") | first | trim }}
{%- endfor %}
{% endfor -%}
"""
footer = ""
trim = true

[git]
conventional_commits = false
filter_unconventional = false
split_commits = false
protect_breaking_commits = false
tag_pattern = "^v?[0-9]+\\.[0-9]+\\.[0-9]+(-.*)?$"
sort_commits = "newest"

commit_parsers = [
  # Skip noise.
  { message = "^Merge branch",        skip = true },
  { message = "^Merge pull request",  skip = true },
  { message = "^Update CHANGELOG",    skip = true },
  { message = "^chore\\(release\\):", skip = true },

  # Categories match the headings published in GitHub Release notes.
  { message = "^Add ",        group = "New Features" },
  { message = "^Implement ",  group = "New Features" },
  { message = "^Support ",    group = "New Features" },
  { message = "^Allow ",      group = "New Features" },
  { message = "^Introduce ",  group = "New Features" },
  { message = "^Enable ",     group = "New Features" },

  { message = "^Fix ",        group = "Bug Fixes" },
  { message = "^Repair ",     group = "Bug Fixes" },
  { message = "^Resolve ",    group = "Bug Fixes" },
  { message = "^Correct ",    group = "Bug Fixes" },

  { message = "^Optimi[sz]e", group = "Performance" },
  { message = "^Speed up",    group = "Performance" },

  { message = "^Document ",   group = "Documentation" },
  { message = "^Docs:? ",     group = "Documentation" },
  { message = "^Clarify ",    group = "Documentation" },

  { message = "^Refactor ",   group = "Internal" },
  { message = "^Clean ",      group = "Internal" },
  { message = "^Rename ",     group = "Internal" },
  { message = "^Move ",       group = "Internal" },
  { message = "^Drop ",       group = "Internal" },
  { message = "^Remove ",     group = "Internal" },
  { message = "^Sweep ",      group = "Internal" },
  { message = "^Update ",     group = "Internal" },
  { message = "^Bump ",       group = "Internal" },

  # Conventional-commit subjects (the current house style, scoped or
  # bare). The imperative-English parsers above remain for the
  # pre-conventional history.
  { message = "^feat(\\([^()]+\\))?!?: ",      group = "New Features" },
  { message = "^fix(\\([^()]+\\))?!?: ",       group = "Bug Fixes" },
  { message = "^perf(\\([^()]+\\))?!?: ",      group = "Performance" },
  { message = "^docs(\\([^()]+\\))?!?: ",      group = "Documentation" },
  { message = "^refactor(\\([^()]+\\))?!?: ",  group = "Internal" },
  { message = "^style(\\([^()]+\\))?!?: ",     group = "Internal" },
  { message = "^test(\\([^()]+\\))?!?: ",      group = "Internal" },
  { message = "^build(\\([^()]+\\))?!?: ",     group = "Internal" },
  { message = "^ci(\\([^()]+\\))?!?: ",        group = "Internal" },
  { message = "^chore(\\([^()]+\\))?!?: ",     group = "Internal" },
  { message = "^revert(\\([^()]+\\))?!?: ",    group = "Internal" },

  # Fallback for anything else.
  { message = ".*",           group = "Other Changes" },
]
