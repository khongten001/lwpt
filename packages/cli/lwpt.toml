# CLI — option parser, subcommand dispatch, help text, interactive prompts.
#
# Vendored from GocciaScript (CLI.Options + CLI.Parser + CLI.Help)
# with LWPT-original units bolted on (CLI.Subcommands + CLI.Prompts).
# Graduated into a standalone LWPT package per ADR-0014. The
# previously-named-exception treatment (TGoccia prefix stripped, dead
# code dropped) moves with the units to this package.
#
# Bundles StringBuffer as a transitive dep (used by CLI.Help) per
# ADR-0014's "bundled shared utils" decision.

[package]
name    = "cli"
version = "0.1.0"
units   = ["source"]
