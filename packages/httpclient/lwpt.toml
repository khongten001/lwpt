# HTTPClient — HTTPS client built on Sockets + OpenSSL.
#
# Vendored from GocciaScript (HTTPClient.pas + TransportSecurity.pas)
# and graduated into a standalone LWPT package per ADR-0014. The
# slim-bootstrap-copy concept from ADR-0003 collapses into this
# package — there's only ONE copy of HTTPClient now, lives here.
#
# Bundles FileUtils + StringBuffer as transitive deps (per
# ADR-0014's "bundled shared utils" decision); both stay verbatim
# from upstream. HTTPClient.Test.pas + the Tests.HTTPMockServer.pas
# support unit live here too so the package is self-testable.

[package]
name    = "httpclient"
version = "0.1.1"
units   = ["source"]
