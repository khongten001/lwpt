# GitHub auto-generated release notes — category config.
#
# Consumed by `softprops/action-gh-release@v2` (via
# `generate_release_notes: true`) in .github/workflows/release.yml.
# Each PR merged into the release range is binned into the first
# matching category, then printed under the category title. PRs
# carrying any label in `exclude.labels` are dropped silently.
#
# Until LWPT adopts a richer changelog tool (e.g. git-cliff with
# cliff.toml), this is the source of truth for release-notes shape.

changelog:
  exclude:
    labels:
      - duplicate
      - invalid
      - wontfix
      - question
      - skip-changelog
  categories:
    - title: "New Features"
      labels:
        - feature
        - enhancement
        - new feature
    - title: "Bug Fixes"
      labels:
        - bug
        - fix
        - os specific
    - title: "Performance"
      labels:
        - performance
    - title: "Documentation"
      labels:
        - documentation
        - docs
    - title: "Internal"
      labels:
        - internal
        - refactor
        - chore
        - dependencies
    - title: "Other Changes"
      labels:
        - "*"
