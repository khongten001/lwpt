# LWPT pre-commit hook.
#
# Install once per fresh clone:  lefthook install
#
# Local pre-commit runs the canonical formatter (`lwpt format`) and
# re-stages any files it rewrites. The heavyweight gates — `lwpt build`
# and `lwpt test` — run on the PR workflow (see .github/workflows/pr.yml)
# so local commits stay fast and don't block on multi-second test runs.
# A pre-merge gate enforces the same checks on every PR; the local hook
# is the cheap convenience.
#
# Do NOT bypass with `git commit --no-verify` unless a maintainer
# explicitly authorises it on the PR.

min_version: 1.5.0

pre-commit:
  parallel: true

  commands:

    format:
      glob: "*.{pas,inc,dpr,toml}"
      run: ./build/lwpt format
      stage_fixed: true
      fail_text: |
        lwpt format failed. Inspect the output above; the formatter
        only fails when it cannot parse a file. If `build/lwpt` is
        missing entirely (fresh clone), run ./bootstrap.sh first. See
        docs/quick-start.md.

    # Refresh the generated AGENTS.md command reference (ADR-0027)
    # whenever a commit touches something that can change it: Pascal
    # sources (command surface), lwpt.toml (run-scripts), or AGENTS.md
    # itself (any .md edit triggers; a non-AGENTS.md doc commit is a
    # cheap no-op). Uses the last-built binary, same trade-off as
    # `format`; a surface change committed before rebuilding is caught
    # by the PR workflow's `lwpt agents --check`.
    agents:
      glob: "*.{pas,toml,md}"
      run: ./build/lwpt agents
      stage_fixed: true
      fail_text: |
        lwpt agents failed. If `build/lwpt` is missing (fresh clone),
        run ./bootstrap.sh first. A corrupt marker pair in AGENTS.md
        must be repaired by hand — see docs/adr/0027-agents-subcommand.md.
