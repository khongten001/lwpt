# LWPT pre-commit hook.
#
# Install once per fresh clone:  lefthook install
#
# Local pre-commit runs the canonical formatter (`lwpt format`) and
# re-stages any files it rewrites. The heavyweight gates — `lwpt build`
# and `lwpt test` — run on the PR workflow (see .github/workflows/pr.yml)
# so local commits stay fast and don't block on multi-second test runs.
# A pre-merge gate enforces the same checks on every PR; the local hook
# is the cheap convenience.
#
# Do NOT bypass with `git commit --no-verify` unless a maintainer
# explicitly authorises it on the PR.

min_version: 1.5.0

pre-commit:
  parallel: true

  commands:

    format:
      glob: "*.{pas,inc,dpr,toml}"
      run: ./build/lwpt format
      stage_fixed: true
      fail_text: |
        lwpt format failed. Inspect the output above; the formatter
        only fails when it cannot parse a file. If `build/lwpt` is
        missing entirely (fresh clone), run ./bootstrap.sh first. See
        docs/quick-start.md.
